name: eventalapp
description: Event's AL - Application de gestion des événements culturels d'Alger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  http: 1.5.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.8.0
  smooth_page_indicator: ^1.2.0+3
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/


